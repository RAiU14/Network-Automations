services:
  postgres:
    image: postgres:16
    container_name: cisco-eox-postgres
    environment:
      POSTGRES_USER: eox_user
      POSTGRES_PASSWORD: eox_password
      POSTGRES_DB: eox_cache
    ports:
      - "5432:5432"
    volumes:
      - eox_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eox_user -d eox_cache"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    container_name: cisco-eox-api
    environment:
      EOX_DATABASE_URL: postgresql+psycopg://eox_user:eox_password@postgres:5432/eox_cache
      EOX_DATA_DIR: /product/data
      EOX_LOG_DIR: /product/logs
      EOX_SECRET_KEY: ${EOX_SECRET_KEY:-}
      EOX_AUTH_ENABLED: ${EOX_AUTH_ENABLED:-false}
      CISCO_CLIENT_ID: ${CISCO_CLIENT_ID:-}
      CISCO_CLIENT_SECRET: ${CISCO_CLIENT_SECRET:-}
      CISCO_ACCESS_TOKEN: ${CISCO_ACCESS_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./data:/product/data
      - ./logs:/product/logs

  frontend:
    build: ./front_end
    container_name: cisco-eox-frontend
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8000
    depends_on:
      - api
    ports:
      - "5173:5173"

volumes:
  eox_postgres_data:
